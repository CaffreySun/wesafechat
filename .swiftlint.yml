# SwiftLint configuration for WeSafeChat
# Run: swiftlint lint          (check only)
# Run: swiftlint lint --fix    (auto-fix safe violations)

included:
  - src
  - main.swift

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - attributes                      # @objc func on same line is AppKit convention
  - file_header                     # no header template needed
  - line_length                     # let editor handle wrapping
  - function_body_length            # AppDelegate has large methods
  - type_body_length                # single-class project
  - trailing_comma                  # personal preference
  - identifier_name                 # CGEventType uses snake_case
  - force_cast                      # needed in some cases
  - cyclomatic_complexity           # not a concern for this size
  - no_fallthrough_only             # unused

type_name:
  min_length: 1
  max_length: 50

nesting:
  type_level: 2

large_tuple:
  warning: 3
  error: 5

file_length:
  warning: 400
  error: 600
