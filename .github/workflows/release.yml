name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate release
        run: |
          VERSION="${GITHUB_REF##*/v}"
          errors=0

          # 1. Info.plist CFBundleShortVersionString matches tag version
          plist_ver=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          if [ "$plist_ver" != "$VERSION" ]; then
            echo "❌ Info.plist CFBundleShortVersionString ($plist_ver) != tag ($VERSION)"
            errors=$((errors + 1))
          fi

          # 2. Info.plist CFBundleVersion matches tag version
          bundle_ver=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist)
          if [ "$bundle_ver" != "$VERSION" ]; then
            echo "❌ Info.plist CFBundleVersion ($bundle_ver) != tag ($VERSION)"
            errors=$((errors + 1))
          fi

          # 3. CHANGELOG.md has a section for this version
          if ! awk "/^## \[$VERSION\]/{found=1} END{exit found ? 0 : 1}" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing section: ## [$VERSION]"
            errors=$((errors + 1))
          fi

          if [ $errors -gt 0 ]; then
            echo "❌ $errors validation error(s) found. Fix and re-tag."
            exit 1
          fi
          echo "✅ All release checks passed"

      - name: Build and package
        run: bash scripts/release.sh "${GITHUB_REF##*/v}"

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF##*/v}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md > /tmp/release-notes.md

      - name: Create Release
        run: |
          VERSION="${GITHUB_REF##*/v}"
          ZIP="WeSafeChat-v${VERSION}.app.zip"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            "$ZIP"
        env:
          GH_TOKEN: ${{ github.token }}
        id: release

      - name: Update Homebrew Cask
        run: |
          VERSION="${GITHUB_REF##*/v}"
          git clone "https://${{ secrets.TAP_TOKEN }}@github.com/CaffreySun/homebrew-tap.git" tap-repo
          cd tap-repo
          sed -i '' \
            -e "s/version \".*\"/version \"$VERSION\"/" \
            -e "s/sha256 \".*\"/sha256 \"${{ steps.release.outputs.sha256 }}\"/" \
            Casks/wesafechat.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/wesafechat.rb
          git commit -m "Update wesafechat cask to $VERSION" || true
          git push
